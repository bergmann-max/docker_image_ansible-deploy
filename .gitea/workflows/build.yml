---
# How to trigger this workflow:
#   1. Commit and push your changes to main:
#        git add .
#        git commit -m "your message"
#        git push origin main
#   2. Create a version tag (must start with "v"):
#        git tag v1.2
#   3. Push the tag to Gitea:
#        git push origin v1.2
#   → The workflow will start automatically and build/push the image
#     as "ansible-deploy:1.2" and "ansible-deploy:latest"
#
# Prerequisites:
#
# Action Secrets:
#   DOCKER_TOKEN  - Docker Hub Access Token
#
# Action Variables:
#   REGISTRY_USER - Docker Hub username
#   IMAGE_NAME    - Docker image name


name: Build docker image ansible-deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-dev:
    if: github.ref_type == 'branch'
    runs-on: ubuntu
    container:
      image: docker:dind@sha256:4d90f1f6c400315c2dba96d3ec93c01e64198395cbba04f79d12adce4f737029
    steps:
      - name: Install Node.js
        run: apk add --no-cache nodejs npm

      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Set up Docker (dind)
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push dev
        run: |
          docker buildx build --push \
            -t ${{ vars.REGISTRY_USER }}/${{ vars.IMAGE_NAME }}:dev \
            .

  build-release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu
    container:
      image: docker:dind@sha256:4d90f1f6c400315c2dba96d3ec93c01e64198395cbba04f79d12adce4f737029
    steps:
      - name: Install Node.js
        run: apk add --no-cache nodejs npm

      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Set up Docker (dind)
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract version from tag
        run: echo "VERSION_TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push release
        run: |
          docker buildx build --push \
            -t ${{ vars.REGISTRY_USER }}/${{ vars.IMAGE_NAME }}:${{ env.VERSION_TAG }} \
            -t ${{ vars.REGISTRY_USER }}/${{ vars.IMAGE_NAME }}:latest \
            .
